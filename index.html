    <style>
        /* 隱藏捲動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 可愛虛線時間軸 */
        .timeline-line {
            position: absolute; left: 1.5rem; top: 2.5rem; bottom: -1rem;
            width: 0; border-left: 4px dashed #FFD6E4; z-index: 0;
        }
        .timeline-item:last-child .timeline-line { display: none; }
        
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #FFF5F8;
            color: #4B5563;
            font-size: 1.25rem;
        }

        /* 介面動畫 */
        @keyframes jellyPop {
            0% { opacity: 0; transform: scale(0.95) translateY(15px); }
            60% { opacity: 1; transform: scale(1.02) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes stampPop {
            0% { opacity: 0; transform: scale(1.8) rotate(-30deg); }
            50% { opacity: 1; transform: scale(0.85) rotate(-5deg); }
            100% { opacity: 1; transform: scale(1) rotate(-15deg); }
        }
        
        .animate-jelly-pop { animation: jellyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
        .animate-stamp { animation: stampPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        input[type="number"], input[type="text"] { font-size: 1.2rem; }

        /* 統一備註內的強調樣式 */
        .note-highlight {
            color: #FF7096;
            font-weight: 900;
        }
        .note-tag {
            background-color: #FEF9C3; /* yellow-100 */
            color: #4B5563;
            font-weight: 700;
            padding: 0 4px;
            border-radius: 4px;
            border-bottom: 2px solid #FEF08A; /* yellow-200 */
        }
        .note-m-logo {
            background-color: #F43F5E; /* rose-500 */
            color: white;
            padding: 0 8px;
            border-radius: 9999px;
            font-size: 0.8em;
            font-weight: 900;
        }
    </style>
</head>

                        steps: ["<span class='note-tag'>10:00</span> 前完成退房手續"] 
                    },
                    { type: "link", title: "搭計程車往指定地", emoji: "🚖", color: "bg-[#FFB3C6]", link: "https://maps.app.goo.gl/7ucepqnKPQ8ENWjx9" }

        let currentDayIndex = 0;

        function init() {
            renderNav();
            renderContent(0);
            fetchLiveRate();
            renderExpenses();
        }

        async function fetchLiveRate() {
            const statusEl = document.getElementById('rate-status');
            const rateInput = document.getElementById('rate-input');
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
                const data = await response.json();
                const liveRate = data.rates.TWD;
                if (liveRate) {
                    rateInput.value = liveRate.toFixed(4);
                    statusEl.innerText = "✨ 即時匯率同步成功";
                    statusEl.classList.replace('text-gray-400', 'text-green-500');
                    calculateCurrency();
                    renderExpenses();
                }
            } catch (e) {
                statusEl.innerText = "⚠️ 匯率同步失敗";
            }
        }

        function renderNav() {
            const utilityContainer = document.getElementById('utility-tabs');
            utilityContainer.innerHTML = '';
            utilityContainer.appendChild(createUtilityBtn('✈️', '總覽', () => toggleModal('overview-modal', 'overview-content')));
            utilityContainer.appendChild(createUtilityBtn('💱', '換算', () => toggleModal('converter-modal', 'converter-content', 'jpy-input')));
            utilityContainer.appendChild(createUtilityBtn('💰', '記帳', () => toggleModal('expenses-modal', 'expenses-content')));

            const dayContainer = document.getElementById('day-tabs');
            dayContainer.innerHTML = '';
            itineraryData.forEach((data, index) => {
                const isActive = index === currentDayIndex;
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center min-w-[5.2rem] py-3 px-3 rounded-[1.5rem] transition-all duration-300 ${isActive ? 'bg-[#FFE4EC] text-[#FF7096] border-4 border-[#FFD6E4] scale-105' : 'bg-white text-gray-400 border-2 border-transparent active:scale-95'}`;
                btn.innerHTML = `<span class="text-xs font-bold opacity-80">D${data.day}</span><span class="font-black text-sm">${data.date}</span>`;
                btn.onclick = () => {
                    currentDayIndex = index;
                    renderNav(); renderContent(index);
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                };
                dayContainer.appendChild(btn);
            });
        }

        function createUtilityBtn(icon, text, onClick) {
            const btn = document.createElement('button');
            btn.className = `flex flex-col items-center justify-center flex-1 py-3 px-2 rounded-[1.5rem] bg-[#FFF5F8] text-[#FF8FAB] border-2 border-[#FFE4EC] shadow-sm active:scale-95 transition-all`;
            btn.innerHTML = `<span class="text-2xl">${icon}</span><span class="font-bold text-xs mt-1">${text}</span>`;
            btn.onclick = onClick;
            return btn;
        }

        function renderContent(dayIdx) {
            const container = document.getElementById('itinerary-content');
            const data = itineraryData[dayIdx];
            let html = `<div class="mb-8 pl-2 animate-fade-in"><h2 class="text-2xl font-black text-gray-700 flex items-center"><span class="bg-[#FFE4EC] text-[#FF7096] px-4 py-2 rounded-2xl text-sm mr-4 border-2 border-[#FFD6E4]">Day ${data.day}</span>${data.date} (${data.weekday})</h2></div><div class="relative pl-1">`;
            data.items.forEach((item, idx) => {
                const isComp = completedState[`d${dayIdx}i${idx}`];
                const cardClass = isComp ? "bg-[#FFF5F8] opacity-60 grayscale-[20%] border-[#FFD6E4]" : "bg-white border-[#FFE4EC]";

                html += `
                    <div class="timeline-item relative pl-12 mb-10 animate-jelly-pop" style="animation-delay:${idx*0.05}s">
                        <div class="timeline-line"></div>
                        <div class="absolute left-0 top-1 w-10 h-10 rounded-full ${item.color} flex items-center justify-center text-white shadow-md border-4 border-white text-xl">
                            ${item.emoji}
                        </div>
                        <div class="rounded-[2.5rem] p-6 shadow-sm border-2 transition-all cursor-pointer active:scale-[0.98] ${cardClass}" onclick="toggleComplete(event, ${dayIdx}, ${idx})">
                            ${isComp ? `<div class="absolute right-4 top-1/2 -translate-y-1/2 border-4 border-[#FF5C8A] text-[#FF5C8A] rounded-xl px-3 py-1.5 text-base font-black bg-white/90 animate-stamp">已踩點</div>` : ''}
                            
                            <div class="flex items-start justify-between mb-1.5 gap-2">
                                <h3 class="font-black text-gray-700 text-xl leading-tight">${item.title}</h3>
                                ${item.link ? `<a href="${item.link}" target="_blank" class="shrink-0 bg-[#FFF5F8] text-[#FF8FAB] border-2 border-[#FFE4EC] px-3 py-1 rounded-xl text-sm font-black active:bg-[#FFE4EC] transition-all">📍 地圖</a>` : ''}
                            </div>

                            ${item.desc ? `<p class="text-gray-500 text-base leading-relaxed font-medium">${item.desc}</p>` : ''}
                            ${item.steps ? `<div class="mt-4 space-y-3 bg-white/70 p-4 rounded-[2rem] border-2 border-[#FFE4EC] text-lg text-gray-700 font-medium">` + item.steps.map((s) => `<div class="flex items-start"><span>${s}</span></div>`).join('') + `</div>` : ''}
                        </div>
                    </div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function toggleComplete(e, d, i) { if (e.target.closest('a')) return; const k = `d${d}i${i}`; completedState[k] = !completedState[k]; localStorage.setItem('tokyo_stamps_data_v12', JSON.stringify(completedState)); renderContent(currentDayIndex); }
        function toggleModal(mId, cId, fId) { const m = document.getElementById(mId), c = document.getElementById(cId), open = m.classList.contains('opacity-0'); m.classList.toggle('opacity-0'); m.classList.toggle('pointer-events-none'); c.classList.toggle('scale-95'); c.classList.toggle('scale-100'); if (open && fId) setTimeout(() => document.getElementById(fId).focus(), 150); }
        function calculateCurrency() { const j = parseFloat(document.getElementById('jpy-input').value) || 0, r = parseFloat(document.getElementById('rate-input').value) || 0.215; document.getElementById('twd-result').innerText = `NT$ ${Math.round(j * r).toLocaleString()}`; }

        function addExpense() {
            const jpyVal = parseFloat(document.getElementById('expense-jpy').value) || 0;
            const twdVal = parseFloat(document.getElementById('expense-twd').value) || 0;
            const noteVal = document.getElementById('expense-note').value || "未備註項目";
            const rate = parseFloat(document.getElementById('rate-input').value) || 0.215;
            if (jpyVal === 0 && twdVal === 0) return;
            const newExp = { id: Date.now(), jpy: jpyVal, twd: twdVal, note: noteVal, rateAtTime: rate };
            expensesList.unshift(newExp);
            localStorage.setItem('tokyo_expenses_v7', JSON.stringify(expensesList));
            document.getElementById('expense-jpy').value = '';
            document.getElementById('expense-twd').value = '';
            document.getElementById('expense-note').value = '';
            renderExpenses();
        }

        function deleteExpense(id) {
            expensesList = expensesList.filter(e => e.id !== id);
            localStorage.setItem('tokyo_expenses_v7', JSON.stringify(expensesList));
            renderExpenses();
        }

        function renderExpenses() {
            const listContainer = document.getElementById('expenses-list');
            const totalDisplay = document.getElementById('total-expense-display');
            const rate = parseFloat(document.getElementById('rate-input').value) || 0.215;
            listContainer.innerHTML = '';
            let grandTotalTwd = 0;
            expensesList.forEach(exp => {
                const itemTotalTwd = Math.round(exp.jpy * rate) + exp.twd;
                grandTotalTwd += itemTotalTwd;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-[1.5rem] border-2 border-[#FFE4EC] shadow-sm flex justify-between items-center animate-fade-in";
                card.innerHTML = `<div class="flex-1"><div class="text-base font-black text-gray-700">${exp.note}</div><div class="text-xs text-gray-400">¥${exp.jpy.toLocaleString()} / $${exp.twd.toLocaleString()}</div></div><div class="text-right flex items-center"><div class="mr-4 font-black text-[#FF7096] text-xl">$${itemTotalTwd.toLocaleString()}</div><button onclick="deleteExpense(${exp.id})" class="text-gray-300 hover:text-rose-400 text-lg">✕</button></div>`;
                listContainer.appendChild(card);
            });
            totalDisplay.innerText = `NT$ ${grandTotalTwd.toLocaleString()}`;
            if (expensesList.length === 0) listContainer.innerHTML = '<div class="text-center py-10 text-gray-300 text-sm font-bold">尚無支出紀錄 🌸</div>';
        }

        window.onload = init;
    </script>
